<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Case Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/form-layout.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Optional: Add a specific CSS for datepicker if needed -->
    <style>
        /* Basic styling for date input */
        input[type="date"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            width: 100%;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h4 class="center-heading">Review Incarceration Status</h4>
<form th:action="@{/case/completeSSNReview}" method="post" class="form-container" th:object="${person}">

    <input type="hidden" name="taskId" th:value="${taskId}"/>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">First Name</label>
        <div class="col-sm-9">
            <input type="text" class="form-control" name="firstName" th:value="${person.firstName}" readonly>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Last Name</label>
        <div class="col-sm-9">
            <input type="text" class="form-control" name="lastName" th:value="${person.lastName}" readonly>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Gender</label>
        <div class="col-sm-9">
            <select name="gender" class="form-control">
                <option th:each="g : ${person.genderOptions}"
                        th:value="${g}" th:text="${g}"
                        th:selected="${g == person.gender}">
                </option>
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">SSN</label>
        <div class="col-sm-9">
            <input type="text" class="form-control" name="ssn" th:value="${person.ssn}" readonly>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Date of Birth</label>
        <div class="col-sm-9">
            <input type="date" class="form-control" name="dateofbirth" th:value="${person.dateofbirth}" readonly>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Incarcerated</label>
        <div class="col-sm-9">
            <input type="text" class="form-control" name="incarcerationStatus" th:value="${person.incarcerationStatus}"
                   readonly>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Update SSN Valid</label>
        <div class="col-sm-9">
            <select th:field="*{updateSSNValid}" class="form-control">
                <option th:each="g : ${person.ssnValidationOptions}"
                        th:value="${g}" th:text="${g}">
                </option>
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-success">Update SSN Status</button>
</form>
