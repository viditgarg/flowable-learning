<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Case Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 rounded-4" style="width: 550px;">

        <h4 class="text-center mb-2">Case Review</h4>
        <p class="text-center text-muted mb-4">Verify all details before submission</p>

        <!-- Optional error -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/case/completeCaseReviewTask}" method="post">
            <input type="hidden" name="taskId" th:value="${taskId}"/>

            <!-- Address Section -->
            <h6 class="mb-3 text-primary">Address Details</h6>

            <div class="mb-2">
                <label class="form-label fw-semibold">Street</label>
                <input type="text" class="form-control" th:value="${street}" readonly>
            </div>

            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold">City</label>
                    <input type="text" class="form-control" th:value="${city}" readonly>
                </div>

                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold">State</label>
                    <input type="text" class="form-control" th:value="${state}" readonly>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Postal Code</label>
                <input type="text" class="form-control" th:value="${postalCode}" readonly>
            </div>

            <!-- Confirmation -->
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" name="confirm" required>
                <label class="form-check-label">
                    I confirm that the above details are correct
                </label>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success w-100">
                    Submit Case
                </button>

                <a href="/case/tasks" class="btn btn-outline-secondary w-100">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
