<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Case Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h4 class="center-heading">Case Registration</h4>

<form th:action="@{/case/new_registration}" method="get">
    <button type="submit" class="btn btn-warning">Register New Case</button>
</form>


<h4 class="center-heading"> In-Progress Cases</h4>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Process Instance ID</th>
        <th>Process Definition Name</th>
        <th>Process Start Time</th>
        <th>Case Primary Person</th>

    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${processes}">
        <td th:text="${p.processInstanceId}"></td>
        <td th:text="${p.processDefinitionName}"></td>
        <td th:text="${p.startTime}"></td>
        <td th:text="${p.applicantName}"></td>
    </tr>
    </tbody>
</table>

<h4 class="center-heading"> Remaining Tasks</h4>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Task ID</th>
        <th>Name</th>
        <th>Assignee</th>
        <th>Process Instance ID</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${tasks}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.name}"></td>
        <td th:text="${t.assignee}"></td>
        <td th:text="${t.processInstanceId}"></td>
        <td>
            <form th:action="@{/tasks/claim}" method="post" style="display:inline;">
                <input type="hidden" name="taskId" th:value="${t.id}"/>
                <select name="user">
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.firstName} + ' ' + ${user.lastName}">

                    </option>
                </select>
                <!--                <input type="text" name="user" placeholder="User"/>-->
                <button type="submit" class="btn btn-sm btn-primary">Claim</button>
            </form>
            <form th:action="@{/case/tasks/complete}" method="post" style="display:inline;">
                <input type="hidden" name="taskId" th:value="${t.id}"/>
                <input type="hidden" name="processInstanceId" th:value="${t.getProcessInstanceId()}"/>
                <button type="submit" class="btn btn-sm btn-success"
                        th:text="${t.taskDefinitionKey == 'caseDetailsTask' ? 'Validate & Continue' :
                  t.taskDefinitionKey == 'finalReviewTask' ? 'Approve' :
                  t.taskDefinitionKey == 'ssnManualTask' ? 'Review SSN' :
                  t.taskDefinitionKey == 'doccsManualTask' ? 'Review Incarceration' : 'Complete'}">
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>


</body>
</html>
