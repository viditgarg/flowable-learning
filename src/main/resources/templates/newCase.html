<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Case Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/form-layout.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Optional: Add a specific CSS for datepicker if needed -->
    <style>
        /* Basic styling for date input */
        input[type="date"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            width: 100%;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>


<h4 class="center-heading">Register New Case</h4>
<div th:if="${errorMessage}" class="alert alert-danger">
    <p th:text="${errorMessage}"></p>
</div>
<form th:action="@{/case/submitRegistration}" th:object="${person}" method="post" class="form-container">
    <!-- First Name -->
    <div class="form-row">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" th:field="*{firstName}" class="form-input-field" required/>
        <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message"></p>
    </div>

    <!-- Last Name -->
    <div class="form-row">
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" th:field="*{lastName}" class="form-input-field" required/>
        <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-message"></p>
    </div>

    <!-- Email -->
    <div class="form-row">
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" class="form-input-field" required/>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></p>
    </div>

    <!-- Gender (Dropdown) -->
    <div class="form-row">
        <label for="gender">Gender:</label>
        <select id="gender" th:field="*{gender}" class="form-input-field" required>
            <option value="">-- Select Gender --</option>
            <!--
                Iterates over a list named 'genderOptions' from the Person object itself (via getter)
                or you could pass a separate list from the controller:
                <option th:each="option : ${genderOptions}" th:value="${option}" th:text="${option}"></option>
            -->
            <option th:each="option : ${person.genderOptions}" th:value="${option}" th:text="${option}"></option>
        </select>
        <p th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="error-message"></p>
    </div>

    <!-- SSN (Social Security Number) -->
    <div class="form-row">
        <label for="ssn">SSN:</label>
        <!-- Using type="text" for SSN to better control formatting and avoid potential issues with leading zeros if stored as String -->
        <!-- If you truly need numeric input, use type="number", but be cautious -->
        <input type="text" id="ssn" th:field="*{ssn}" class="form-input-field" required/>
        <p th:if="${#fields.hasErrors('ssn')}" th:errors="*{ssn}" class="error-message"></p>
        <!-- Note: For SSN, server-side validation and security are paramount. -->
    </div>

    <!-- Date of Birth -->
    <div class="form-row">
        <label for="dateofbirth">Date of Birth:</label>
        <!-- Use type="date" for a native browser date picker -->
        <input type="date" id="dateofbirth" th:field="*{dateofbirth}" class="form-input-field" required/>
        <p th:if="${#fields.hasErrors('dateofbirth')}" th:errors="*{dateofbirth}" class="error-message"></p>
    </div>

    <!-- Submit Button -->
    <div class="form-row button-row">
        <button type="submit">Submit</button>
    </div>
</form>


</body>
</html>
