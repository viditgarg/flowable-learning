<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h4>Start New Process</h4>
<form th:action="@{/process/start}" method="post">
    <button type="submit" class="btn btn-warning">Start Approval Process</button>
</form>

<h4>Running Processes</h4>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Process Instance ID</th>
        <th>Process Definition ID</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${processes}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.processDefinitionId}"></td>
    </tr>
    </tbody>
</table>

<h4>Submitted Tasks</h4>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Task ID</th>
        <th>Name</th>
        <th>Assignee</th>
        <th>Process Instance ID</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${tasks}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.name}"></td>
        <td th:text="${t.assignee}"></td>
        <td th:text="${t.processInstanceId}"></td>
        <td>
            <form th:action="@{/tasks/claim}" method="post" style="display:inline;">
                <input type="hidden" name="taskId" th:value="${t.id}" />
                <select name="user">
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.firstName} + ' ' + ${user.lastName}">

                    </option>
                </select>
<!--                <input type="text" name="user" placeholder="User"/>-->
                <button type="submit" class="btn btn-sm btn-primary">Claim</button>
            </form>
            <form th:action="@{/tasks/complete}" method="post" style="display:inline;">
                <input type="hidden" name="taskId" th:value="${t.id}" />
                <input type="hidden" name="processInstanceId" th:value="${t.getProcessInstanceId()}" />
                <button type="submit" class="btn btn-sm btn-success">Complete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>




</body>
</html>
